<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Bombado - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">🐾 Pet <span>Bombado</span></div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/cadastroUsuario.html">Cadastrar</a>
        </nav>
    </header>

    <main class="login-body">
        <div class="auth-card">
            <h1>Bem-vindo!</h1>
            <form action="/login" method="POST">
                <label for="email">E-mail Corporativo ou Pessoal</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                
                <button type="submit" class="button" style="width: 100%; margin-top: 15px;">Entrar no Sistema</button>
            </form>
            <div class="auth-links">
                <p>Esqueceu a senha? <a href="recuperarSenha.html">Recuperar agora</a></p>
                <p>Não possui conta? <a href="cadastroUsuario.html">Crie sua carteira</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2024 <span class="footer-brand">Pet Bombado 2</span>. Todos os direitos reservados.</p>
            <p>Sua plataforma de cuidado animal para Clientes e Pet Shops.</p>
        </div>
    </footer>
</body>
</html>
