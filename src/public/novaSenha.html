<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha</title>
</head>
<body>

    <h1>Redefinir Senha</h1>

    <form action="/novaSenha" method="POST">

        <input type="hidden" name="email" id="email">

        <label>Nova senha:</label>
        <input type="password" name="senha" required>

        <br><br>

        <button type="submit">
            Salvar nova senha
        </button>

    </form>

    <script>
        const params = new URLSearchParams(window.location.search)//pega os parâmetros da URL

        document.getElementById('email').value =
            params.get('email')//pega o valor do parâmetro email e coloca no campo oculto do formulário
    </script>

</body>
</html>
