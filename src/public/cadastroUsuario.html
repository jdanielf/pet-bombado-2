<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Bombado - Cadastro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">🐾 Pet <span>Bombado</span></div>
        <nav class="nav-links">
            <a href="/login.html">Login</a>
        </nav>
    </header>

    <main class="cadastro-body">
        <div class="cadastro-card">
            <h1>Criar Nova Conta</h1>
            <form action="/usuario" method="POST">
                <label for="nome">Nome Completo / Nome da Empresa</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva ou Pet Shop AuAu" required>
                
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="contato@pet.com" required>
                
                <label for="senha">Senha Segura</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>
                
                <label for="perfil">Tipo de Perfil</label>
                <select id="perfil" name="perfil" required>
                    <option value="cliente">🐾 Sou Cliente (Dono de Pet)</option>
                    <option value="petshop">🏢 Sou Empresa (Pet Shop / Clínica)</option>
                    <option value="admin">🛠️ Administrador</option>
                </select>
                
                <button type="submit" class="button" style="width: 100%; margin-top: 20px; background-color: #54a0ff;">Finalizar Cadastro</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <p>Já possui conta? <a href="login.html" style="color: #54a0ff; font-weight: bold; text-decoration: none;">Faça Login</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2024 <span class="footer-brand">Pet Bombado 2</span>. A melhor gestão para seu melhor amigo.</p>
        </div>
    </footer>
</body>
</html>
